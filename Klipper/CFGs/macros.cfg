[gcode_macro TEST_SPEED]
# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10

description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU

gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = printer.toolhead.axis_minimum.y + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-60} Y{printer.toolhead.axis_maximum.y-60} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 30} F{speed*60}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED
    
[gcode_macro TEST_AXIS_Z]
description: Move Z axis for testing and maintance with parameters
gcode:
    {% set min_z = params.MIN|default(10)|float %}
    {% set max_z = params.MAX|default(180)|float %}
    {% set speed = params.S|default(10)|float %}
    {% set cycle = params.CYCLE|default(5)|int %}

    RESPOND TYPE=echo MSG="Starting Z movement test: min={min_z} max={max_z} speed={speed} mm/s cycles={cycle}"

    {% for i in range(cycle) %}
        G1 Z{max_z} F{speed * 60}
        G1 Z{min_z} F{speed * 60}
    {% endfor %}

    RESPOND TYPE=echo MSG="Z movement test completed."  

[gcode_macro M300]
gcode:
    # Use a default 1kHz tone if S is omitted.
    {% set S = params.S|default(1000)|int %}
    # Use a 10ms duration is P is omitted.
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=BEEPER_pin VALUE=0.5 CYCLE_TIME={1/S if S > 0 else 1}
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0

[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s-8} MAXIMUM={s+6}   ; Wait for hotend temp (within 1 degree)
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-6} MAXIMUM={s+12}  ; Wait for bed temp (within 1 degree)
    {% endif %}

[gcode_macro PURGE_LINE]
gcode:
  M106 S250
  G1 Y10 X20 F6000        ; Fron side of BED
  G1 Z0.28 F1000
  G91                     ; Relative coordinates
  G1 E20 F200             ; Initial purge drop - compensate how much it retracted in PRINT_END                                          
  G1 X3 F100
  G1 E10 F200
  M106 S0
  G1 X160 E25 F600        ; Extrude filament in first thick line 
  G1 Y-2 F1000            ; Turn back 
  G1 X-140 E9 F800        ; Print second part of the line
  G1 X1 E0 F1600          ; Wipe back to break string
  G1 X-5 E0 F2600         ; Wipe forward to break string 
  G1 Y10 E0 F3800         ; Wipe sideward to break string

[gcode_macro PRINT_START]
variable_temp_ext: 0
gcode:

    M300 P600 ; Init BEEP
    M107      ; disable all model cooling fans
    M220 S100 ; Reset Feedrate
    M221 S100 ; Reset Flowrate
    
    SET_LED LED=Chamber_Led WHITE=1 SYNC=0 TRANSMIT=1
   
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}                          ; SET BED Temp param
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(240)|float %}               ; SET EXTRUDER Temp param
    {% set FILAMENT_TYPE = params.FILAMENT_TYPE|default("PLA") %}                  ; SET FILAMENT Type
    SET_GCODE_VARIABLE MACRO=PRINT_START VARIABLE=temp_ext VALUE={ EXTRUDER_TEMP }

    {% if printer.heater_bed.temperature < params.BED_TEMP|float - 10 %}            ; Pokud je teplota podložky nižší o více než 10 stupňů
      M190 S{BED_TEMP}                                                              ; Čekej na ohřev podložky
    {% elif printer.heater_bed.temperature > params.BED_TEMP|float + 10 %}          ; Pokud je teplota podložky vyšší o více než 10 stupňů
      M190 S{BED_TEMP + 10}                                                         ; Čekej na ohřev podložky
      M140 S{BED_TEMP}                                                              ; Nastav správnou teplotu podložky
    {% else %}                                                                      ; Pokud je rozdíl teploty podložky menší než ±10 stupňů od požadované
      M140 S{BED_TEMP}                                                              ; Nastav správnou teplotu podložky a pokračuj
    {% endif %}

    # Nastav PA podle materiálu
    {% if FILAMENT_TYPE == "PLA" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.065
    {% elif FILAMENT_TYPE == "PETG" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.12
    {% elif FILAMENT_TYPE == "ABS" or FILAMENT_TYPE == "ASA" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.06
    {% elif FILAMENT_TYPE == "TPU" %}
        SET_PRESSURE_ADVANCE ADVANCE=0.00
    {% else %}
        SET_PRESSURE_ADVANCE ADVANCE=0.10
    {% endif %}

    SET_GCODE_VARIABLE MACRO=SET_PRESSURE_ADVANCE VARIABLE=from_macro VALUE=True
    {action_respond_info("Filament: %s, PA nastaveno" % FILAMENT_TYPE)}


    M104 S{EXTRUDER_TEMP - 50}
    G28                                                                             # home všechny osy
    Z_TILT_ADJUST                                                                   # vyrovnání předního a zadního Z motoru                  
    #G28                                                                            # znovu home Z po tilt adjustu
    BED_MESH_CALIBRATE                                                              # měření lože                                                                             
    G90                                                                             ; Use absolute coordinates
    
    M104 S{EXTRUDER_TEMP}                                                           ; set
    
    M109 S{EXTRUDER_TEMP}                                                           ; wait
    PURGE_LINE
    M83                                                                             ; RELATIVE extrusion

[gcode_macro PRINT_END]
gcode:
    G1 E-20 F600
    G90
    G1 X3 Y257 F12000
    G90
    #M140 S{printer.heater_bed.temperature - 20}
    M104 S{printer["gcode_macro PRINT_START"].temp_ext - 50} # set  
    M107  
    {% set z_max = printer.toolhead.axis_maximum.z %}
    {% set z_pos = printer.toolhead.position.z %}
    {% if z_pos < (z_max - 50) %}
      G1 Z {(z_pos + 50)} F600
    {% endif %}

    SET_GCODE_VARIABLE MACRO=SET_PRESSURE_ADVANCE VARIABLE=from_macro VALUE=False
    SET_LED LED=Chamber_Led WHITE=0.40 SYNC=0 TRANSMIT=1
    
[gcode_macro PARK]
gcode:
    {% set z_max = printer.toolhead.axis_maximum.z %}   
    {% set z_pos = printer.toolhead.position.z %}
    {% set y_max = printer.toolhead.axis_maximum.y %}
    {% set x_min = printer.toolhead.axis_minimum.x %}
    {% set park_height = 100 %}
    {% set x = 10 %}      #edit to your park position
    {% set y = 250 %}      #edit to your park position
    {% set z = params.Z|default(park_height)|float %} #edit to your park position
    
    #{% set x = params.X|default(x_min) %}      #edit to your park position
    #{% set y = params.Y|default(y_max) %}      #edit to your park position
    #{% set z = params.Z|default(park_height)|float %} #edit to your park position
    
    {% if z_pos > (z_max ) %}
      #M117 Z {z_pos} Cant raise
    {% elif z_pos > park_height + 0.04 %}
      #M117 Z {z_pos} goto { (( z_max - 10 - z_pos) * 0.5 ) + z_pos }
      G1 Z { (( z_max - 10 - z_pos) * 0.5 ) + z_pos } F600
    {% elif z_pos < park_height -0.04 %}
      #M117 Z {z_pos} goto {park_height}
      G1 Z {z} F600
    {% else %}
      M117 I think we are already at park height
      UPDATE_DELAYED_GCODE ID=clear_display DURATION=10
    {% endif %}    
    G1 Y {y} X {x} F3000

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    #TURN_OFF_HEATERS
    CANCEL_PRINT_BASE
    G1 E-20 F600
    #M140 S{printer.heater_bed.temperature - 20}
    {% if printer.extruder.temperature > 50 %}
      M104 S{printer.extruder.temperature - 50}
    {% else %}
      M104 S0
    {% endif %}
    M107
    MOVE_OUT
    SET_GCODE_VARIABLE MACRO=SET_PRESSURE_ADVANCE VARIABLE=from_macro VALUE=False
    SET_LED LED=Chamber_Led WHITE=0.40 SYNC=0 TRANSMIT=1

[gcode_macro MOVE_OUT]
gcode:
    G90
    G1 X3 Y257 F12000
    G90

    {% set z_max = printer.toolhead.axis_maximum.z %}
    {% set z_pos = printer.toolhead.position.z %}
    {% if z_pos < (z_max - 30) %}
      G1 Z {(z_pos + 30)} F600
    {% endif %}

[gcode_macro BEEP_TEST]
gcode:
    {% for i in range(20) %}
        M300 P300
        G4 P200
    {% endfor %}
    

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
variable_extrude: 5.0        ; retrakce při pauze
variable_park_x: 10
variable_park_y: 250
variable_z_hop: 10           ; výraznější Z hop
variable_saved_x: 0
variable_saved_y: 0
variable_saved_z: 0
gcode:
    {% if printer.pause_resume.is_paused %}
        {action_respond_info("Tiskarna je uz pozastavena")}
    {% else %}
        RESPOND TYPE=echo_no_space MSG="Tiskarna PAUSE"
        {% set E = printer["gcode_macro PAUSE"].extrude|float %}
        {% set max_z = printer.toolhead.axis_maximum.z|float %}
        {% set act_z = printer.toolhead.position.z|float %}
        {% set z_safe = [z_hop, max_z - act_z] | min %}

        SAVE_GCODE_STATE NAME=PAUSE_STATE
        PAUSE_BASE

        {% if printer.extruder.can_extrude %}
            G91
            G1 E-{E} F2100
        {% endif %}

        {% if "xyz" in printer.toolhead.homed_axes %}
            G91
            G1 Z{z_safe} F900
            G90
            G1 X{park_x} Y{park_y} F6000
        {% endif %}
    {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    {% if not printer.pause_resume.is_paused %}
        {action_respond_info("Tiskarna nebezi v paused stavu")}
    {% else %}
        RESPOND TYPE=echo_no_space MSG="Tiskarna RESUME"
        {% set E = printer["gcode_macro PAUSE"].extrude|float %}
        {% if 'VELOCITY' in params|upper %}
            {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
        {% else %}
            {% set get_params = "" %}
        {% endif %}

        {% if printer.extruder.can_extrude %}
            G91
            G1 E{E} F800    ; vrací přesně tolik co bylo retrahováno
        {% else %}
            {action_respond_info("Extruder neni dost horky")}
        {% endif %}

        RESTORE_GCODE_STATE NAME=PAUSE_STATE MOVE=1 MOVE_SPEED=100
        SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity}
        RESUME_BASE {get_params}
    {% endif %}

[gcode_macro CENTER_MOVE]
description: Move to the center of BED at Z 25
gcode:
    G90
    G1 X200 Y130 Z25 F12000
    G90

[gcode_macro FRONT_MOVE]
description: Move to the FRONT of BED at Z 60
gcode:
    G90
    G1 X200 Y0 Z60 F12000
    G90    

[gcode_macro RAISE_BED_50mm]
gcode:
  FORCE_MOVE STEPPER=stepper_z DISTANCE=-50 VELOCITY=10 ACCEL=100

[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: _SET_PRESSURE_ADVANCE_ORIG
variable_from_macro: False
gcode:
    {% if printer["gcode_macro SET_PRESSURE_ADVANCE"].from_macro %}
        {action_respond_info("PA override ze sliceru ignorovano, pouzit PA z PRINT_START")}
    {% else %}
        _SET_PRESSURE_ADVANCE_ORIG {rawparams}
    {% endif %}

[gcode_macro M900]
gcode:
  {% if 'K' in params %}
    SET_PRESSURE_ADVANCE ADVANCE={params.K}
  {% endif %}

[gcode_macro T0]
gcode:

