[bltouch]
sensor_pin: ^PD13
control_pin: PD12
pin_move_time: 0.2
#pin_up_touch_mode_reports_triggered: False
#pin_up_reports_not_triggered: True
stow_on_each_sample: True
x_offset: -27
y_offset: -20
#z_offset: 1.7
samples: 3
speed: 3
sample_retract_dist: 4
lift_speed: 5
samples_result: median
samples_tolerance: 0.03 # 0.02
samples_tolerance_retries: 10

[safe_z_home]
home_xy_position: 200, 130
speed: 60
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 60
horizontal_move_z: 5       # výška při přejezdech mezi body — 5 mm je safe
mesh_min: 0, 20
mesh_max: 370, 240
probe_count: 5, 4
mesh_pps: 2, 2             # interpolační body mezi měřenými — 2,2 je standard
algorithm: bicubic
fade_start: 1.0
fade_end: 10.0
fade_target: 0
zero_reference_position: 200, 130   # střed plochy — nebo relative_reference_index: 9

[z_tilt]
z_positions:
    200, -30     # přední motor — Y mimo tiskovou plochu (za hranou)
    200, 290     # zadní motor  — Y mimo tiskovou plochu (za hranou)
points:
    225, 20      # blízko předního šroubu
    225, 270     # blízko zadního šroubu
speed: 60
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.04

