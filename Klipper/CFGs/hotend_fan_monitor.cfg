[delayed_gcode FAN_WATCH]
# Spouští se automaticky 5 sekund po startu Klipperu
initial_duration: 5
gcode:
    _FAN_CHECK

[gcode_macro _FAN_CHECK]
variable_stopped_at: 0
gcode:
    {% set fan_name = "heater_fan Hotend_Fan" %}
    {% set fan_exists = fan_name in printer %}

    {% if not fan_exists %}
        {action_respond_info("CHYBA: '%s' nenalezen!" % fan_name)}
        UPDATE_DELAYED_GCODE ID=FAN_WATCH DURATION=5
    {% else %}
        {% set fan = printer[fan_name] %}
        {% set rpm = fan.rpm | default(0) | float %}
        {% set temp = printer.extruder.temperature | float %}
        {% set stopped_at = printer["gcode_macro _FAN_CHECK"].stopped_at %}
        {% set now = printer.toolhead.estimated_print_time %}

        {% if temp > 50 %}
            {% if rpm == 0 %}
                {% if stopped_at == 0 %}
                    SET_GCODE_VARIABLE MACRO=_FAN_CHECK VARIABLE=stopped_at VALUE={now}
                    M117 VAROVANI: Fan zastavil!
                    {action_respond_info("VAROVANI: Hotend_Fan zastavil! Cekam 10s...")}
                {% elif (now - stopped_at) > 10 %}
                    {action_respond_info("KRITICKY: Fan 10s bez otacek! EMERGENCY STOP!")}
                    M117 KRITICKY: Fan zastaven!
                    PAUSE
                    M104 S0
                    M140 S0
                    {action_emergency_stop("Hotend_Fan zastaven >10s")}
                {% endif %}
            {% elif rpm < 3000 %}
                SET_GCODE_VARIABLE MACRO=_FAN_CHECK VARIABLE=stopped_at VALUE=0
                M117 UPOZORNENI: Fan {rpm|int} RPM
                {action_respond_info("UPOZORNENI: Hotend_Fan pouze %d RPM!" % rpm|int)}
            {% else %}
                {% if stopped_at != 0 %}
                    {action_respond_info("OK: Hotend_Fan obnoven - %d RPM" % rpm|int)}
                    M117 Fan OK: {rpm|int} RPM
                {% endif %}
                SET_GCODE_VARIABLE MACRO=_FAN_CHECK VARIABLE=stopped_at VALUE=0
            {% endif %}
        {% else %}
            SET_GCODE_VARIABLE MACRO=_FAN_CHECK VARIABLE=stopped_at VALUE=0
        {% endif %}

        UPDATE_DELAYED_GCODE ID=FAN_WATCH DURATION=2
    {% endif %}

## Jak to funguje

#Klipper start → 5s → první kontrola → opakuje každé 2s
#                               │
#               temp > 50°C? ──┤
#                  NE → reset, čeká
#                  ANO → kontrola RPM
#                          │
#                rpm > 3000 → OK, reset časovače
#                rpm < 3000 → VAROVÁNÍ v konzoli
#                rpm == 0   → zaznamená čas zastavení
#                             po 10s → EMERGENCY STOP
#                                      + hotend/bed off

[gcode_macro FAN_MONITOR_OFF]
gcode:
    UPDATE_DELAYED_GCODE ID=FAN_WATCH DURATION=0
    {action_respond_info("Fan monitoring vypnut")}

[gcode_macro FAN_MONITOR_ON]
gcode:
    UPDATE_DELAYED_GCODE ID=FAN_WATCH DURATION=2
    {action_respond_info("Fan monitoring zapnut")}                                      