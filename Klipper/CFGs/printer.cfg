######################################################################
# Printer settings, includes
######################################################################

[include mainsail.cfg]

[exclude_object]

[pause_resume]

[display_status]

[include hotend_fan_monitor.cfg]

[include macros.cfg]

[include bltouch.cfg]

[mcu]
## Obtain definition by "ls /dev/serial/by-id/*" then unplug to verify
serial:/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[virtual_sdcard]
path: /home/m/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: cartesian
max_velocity: 100
max_accel: 2000 
max_z_velocity: 10
max_z_accel: 150

[temperature_sensor Lerdge_MCU]
sensor_type: temperature_mcu

[temperature_sensor RPi_CPU]
sensor_type: temperature_host

[temperature_sensor chamber]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
#pullup_resistor: 4700

[idle_timeout]
timeout: 3600

[gcode_arcs]
resolution: 0.1

######################################################################
# Motors, Heaters, Fans, LEDs
######################################################################

[stepper_x]
step_pin: PB11
dir_pin: !PB10
enable_pin: !PB12
microsteps: 16
rotation_distance: 11.981428785382658
endstop_pin: ~!PB13
position_min: 0
position_endstop: 0
position_max: 400
homing_speed: 40
second_homing_speed: 5

[stepper_y]
step_pin: PB1
dir_pin: PB0
enable_pin: !PB2
microsteps: 16
rotation_distance: 11.981428785382658
endstop_pin: ~!PB14  
position_min: 0
position_endstop: 270
position_max: 270
homing_speed: 40
second_homing_speed: 5

[stepper_z] # Front motor
step_pin: PC4
dir_pin: !PA7
enable_pin: !PC5
microsteps: 16
rotation_distance: 1.5046503098639235
endstop_pin: probe:z_virtual_endstop #~!PB15 Previous Z endstop 
position_min: -2
position_max: 200
homing_speed: 4
homing_retract_dist: 6.0
homing_retract_speed: 6
second_homing_speed: 2

[stepper_z1] # Rear motor
step_pin: PC14
dir_pin: !PC13
enable_pin: !PC15
microsteps: 16
rotation_distance: 1.5046503098639235

[extruder]
step_pin: PA5
dir_pin: PA4
enable_pin: !PA6
microsteps: 16
rotation_distance: 2.85343130124
nozzle_diameter: 0.400
pressure_advance: 0.065
filament_diameter: 1.750
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
#control: pid
#pid_Kp: 16.294 #16.323
#pid_Ki: 1.086 #0.693
#pid_Kd: 61.102 #96.100
min_temp: 0
max_temp: 320
min_extrude_temp: 10
max_extrude_only_distance: 101
max_extrude_only_velocity: 100.0
max_extrude_only_accel: 1000.0

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC2
pullup_resistor: 4700
control: pid
pid_kp: 63.995
pid_ki: 1.693
pid_kd: 604.750
min_temp: 0
max_temp: 110

[verify_heater heater_bed]
max_error: 120
check_gain_time: 100
hysteresis: 5
heating_gain: 2

[fan_generic Model_Fan]
pin: PE5
kick_start_time: 0.10

[heater_fan Hotend_Fan]
pin: PE4
heater: extruder
heater_temp: 40.0
tachometer_pin: ^PB15  # ^ = aktivuje interní pull-up pokud není externí
tachometer_ppr: 2     # impulzy na otáčku — většina ventilátorů má 2
tachometer_poll_interval: 0.0005

[controller_fan Board_Cooling_Fan]
pin: PA3
idle_timeout: 60
max_power: 1.0  
  
[output_pin Power_OFF_Pin]
pin: PC3
value: 0
shutdown_value: 0

[led Chamber_Led]
white_pin: PC6
initial_WHITE: 0.6

[gcode_macro Shutdown]
gcode:
  RESPOND TYPE=echo_no_space MSG="Printer shutting down."
  M300 P600
  #SET_PIN PIN=Power_OFF_Pin VALUE=1
  G4 P1600
  M300 P6000

[respond]
default_type: echo
#   Sets the default prefix of the "M118" and "RESPOND" output to one
#   of the following:
#       echo: "echo: " (This is the default)
#       command: "// "
#       error: "!! "
default_prefix: echo:
#   Directly sets the default prefix. If present, this value will
#   override the "default_type".

