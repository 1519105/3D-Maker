[gcode_macro SET_PRESSURE_ADVANCE]
rename_existing: _SET_PRESSURE_ADVANCE_ORIG
variable_lock: False
description: Wrapped PA setter. Behem tisku lock=True ignoruje override z gcode.
gcode:
    {% if printer["gcode_macro SET_PRESSURE_ADVANCE"].lock %}
        {action_respond_info("PA override ignorovan (lock aktivni). Pro vynuceni: PA_FORCE ADVANCE=...")}
    {% else %}
        _SET_PRESSURE_ADVANCE_ORIG {rawparams}
    {% endif %}

[gcode_macro PA_FORCE]
description: Vynuti zmenu PA i pri aktivnim locku (rucni zmena, TUNING_TOWER)
gcode:
    _SET_PRESSURE_ADVANCE_ORIG {rawparams}
    {action_respond_info("PA forcibly set: %s" % rawparams)}

[gcode_macro PA_LOCK]
description: Zapne ignorovani PA z gcode (volat na konci PRINT_START)
gcode:
    SET_GCODE_VARIABLE MACRO=SET_PRESSURE_ADVANCE VARIABLE=lock VALUE=True
    {action_respond_info("PA lock ON")}

[gcode_macro PA_UNLOCK]
description: Vypne ignorovani PA z gcode (volat v PRINT_END / CANCEL)
gcode:
    SET_GCODE_VARIABLE MACRO=SET_PRESSURE_ADVANCE VARIABLE=lock VALUE=False
    {action_respond_info("PA lock OFF")}
